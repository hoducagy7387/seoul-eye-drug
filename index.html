<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울안과 약품 관리</title>
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root {
  --bg: #f5f6f8;
  --card: #ffffff;
  --border: #e2e5ea;
  --text: #1a1d23;
  --text2: #5f6672;
  --text3: #9aa0ab;
  --primary: #2563eb;
  --primary-light: #eff4ff;
  --danger: #ef4444;
  --danger-light: #fef2f2;
  --danger-bg: #fee2e2;
  --warning: #f59e0b;
  --warning-light: #fffbeb;
  --warning-bg: #fef3c7;
  --success: #10b981;
  --success-light: #ecfdf5;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.08);
  --radius: 10px;
  --dept-접수실: #2563eb;
  --dept-수술실: #7c3aed;
  --dept-원무실: #0891b2;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

/* ── Setup Screen ── */
.setup-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.setup-box {
  background: var(--card);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  padding: 48px 40px;
  max-width: 480px;
  width: 100%;
  text-align: center;
}
.setup-box h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}
.setup-box .sub {
  color: var(--text2);
  font-size: 14px;
  margin-bottom: 32px;
}
.setup-box label {
  display: block;
  text-align: left;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 6px;
}
.setup-box input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  margin-bottom: 20px;
  outline: none;
  transition: border .15s;
}
.setup-box input:focus { border-color: var(--primary); }
.setup-box .hint {
  text-align: left;
  font-size: 12px;
  color: var(--text3);
  margin-top: -14px;
  margin-bottom: 20px;
}
.setup-box button {
  width: 100%;
  padding: 13px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: opacity .15s;
}
.setup-box button:hover { opacity: .9; }

/* ── Top Header ── */
.top-bar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar .logo {
  font-weight: 800;
  font-size: 17px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.top-bar .logo .pill {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  color: #fff;
}
.top-bar .right {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text2);
}
.top-bar .right .badge {
  background: var(--danger);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: -4px;
}
.btn-icon {
  width: 36px; height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  cursor: pointer;
  color: var(--text2);
  transition: background .15s;
}
.btn-icon:hover { background: var(--bg); }
.btn-settings {
  font-size: 13px;
  font-family: inherit;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  cursor: pointer;
  color: var(--text2);
}
.btn-settings:hover { background: var(--bg); }

/* ── Department Tabs ── */
.dept-tabs {
  display: flex;
  gap: 0;
  padding: 16px 24px 0;
}
.dept-tab {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text3);
  border-bottom: 2.5px solid transparent;
  transition: all .15s;
}
.dept-tab:hover { color: var(--text); }
.dept-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

/* ── Main Content ── */
.main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }

/* ── Summary Cards ── */
.summary-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.summary-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
}
.summary-card .label {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
  margin-bottom: 4px;
}
.summary-card .value {
  font-size: 26px;
  font-weight: 800;
}
.summary-card.alert-card .value { color: var(--danger); }
.summary-card.warn-card .value { color: var(--warning); }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.search-box {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  background: var(--card);
  outline: none;
}
.search-box input:focus { border-color: var(--primary); }
.search-box svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
}
.filter-select {
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  background: var(--card);
  color: var(--text);
  cursor: pointer;
  outline: none;
}
.btn-primary {
  padding: 10px 20px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: opacity .15s;
  white-space: nowrap;
}
.btn-primary:hover { opacity: .9; }

/* ── Alert Banner ── */
.alert-banner {
  background: var(--danger-light);
  border: 1px solid var(--danger-bg);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  color: #991b1b;
  line-height: 1.5;
}
.alert-banner.warn {
  background: var(--warning-light);
  border-color: var(--warning-bg);
  color: #92400e;
}
.alert-banner svg { flex-shrink: 0; margin-top: 2px; }
.alert-banner strong { font-weight: 700; }
.alert-items { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.alert-chip {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.alert-chip.exp { background: #fee2e2; color: #b91c1c; }
.alert-chip.low { background: #fef3c7; color: #b45309; }

/* ── Table ── */
.table-wrap {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
thead th {
  text-align: left;
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .03em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  user-select: none;
  cursor: pointer;
}
thead th:hover { color: var(--text); }
tbody td {
  padding: 12px 16px;
  border-bottom: 1px solid #f0f1f4;
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #fafbfc; }
.type-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  background: #f0f1f4;
  color: var(--text2);
}
.stock-bar {
  width: 80px;
  height: 6px;
  background: #e5e7eb;
  border-radius: 3px;
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
  margin-right: 8px;
}
.stock-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.status-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
}
.dept-label {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  color: #fff;
}
.actions-cell {
  display: flex;
  gap: 4px;
}
.btn-sm {
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-family: inherit;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn-sm:hover { background: var(--bg); }
.btn-sm.del { color: var(--danger); border-color: #fecaca; }
.btn-sm.del:hover { background: var(--danger-light); }

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.35);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn .15s;
}
@keyframes fadeIn { from { opacity: 0; } }
.modal {
  background: var(--card);
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp .2s;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 0;
}
.modal-header h2 { font-size: 18px; font-weight: 700; }
.modal-close {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: var(--bg); border-radius: 8px;
  cursor: pointer; color: var(--text2); font-size: 18px;
}
.modal-body { padding: 20px 24px; }
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 5px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border .15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--primary);
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer {
  padding: 0 24px 20px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.btn-cancel {
  padding: 10px 20px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}
.btn-save {
  padding: 10px 24px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
}
.btn-save:hover { opacity: .9; }

/* ── Loading & Empty ── */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.loading .spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ── Toast ── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,.15);
  animation: toastIn .3s;
  max-width: 320px;
}
.toast.error { background: var(--danger); }
.toast.success { background: var(--success); }
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } }

/* ── Responsive ── */
@media (max-width: 768px) {
  .main { padding: 16px; }
  .summary-row { grid-template-columns: 1fr 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .top-bar { padding: 0 16px; }
  .dept-tabs { padding: 12px 16px 0; overflow-x: auto; }
  .toolbar { gap: 8px; }
  .btn-primary span.label-text { display: none; }
}
</style>
</head>
<body>

<!-- ═══ App ═══ -->
<div id="app" style="display:none;">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo">
      💊 서울안과 약품관리
      <span class="pill" id="myDeptBadge"></span>
    </div>
    <div class="right">
      <span id="alertCountArea"></span>
      <button class="btn-icon" onclick="loadData()" title="새로고침">↻</button>
    </div>
  </div>

  <!-- Dept Tabs -->
  <div class="dept-tabs" id="deptTabs"></div>

  <div class="main">
    <!-- Summary -->
    <div class="summary-row" id="summaryRow"></div>

    <!-- Alerts -->
    <div id="alertArea"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="약품명 검색..." oninput="renderTable()" />
      </div>
      <select class="filter-select" id="typeFilter" onchange="renderTable()">
        <option value="">전체 종류</option>
      </select>
      <select class="filter-select" id="statusFilter" onchange="renderTable()">
        <option value="">전체 상태</option>
        <option value="normal">정상</option>
        <option value="expiring">유효기간 임박</option>
        <option value="low">재고 부족</option>
        <option value="both">복합 경고</option>
      </select>
      <button class="btn-primary" onclick="openAddModal()">
        <span style="font-size:18px;">+</span> <span class="label-text">약품 등록</span>
      </button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('부서')">부서</th>
            <th onclick="sortBy('약품명')">약품명</th>
            <th onclick="sortBy('종류')">종류</th>
            <th onclick="sortBy('수량')">재고</th>
            <th onclick="sortBy('유효기간')">유효기간</th>
            <th>상태</th>
            <th onclick="sortBy('담당자')">담당자</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="loadingArea"></div>
      <div id="emptyArea"></div>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Modal -->
<div id="modalOverlay" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">약품 등록</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId" />
      <div class="form-group">
        <label>부서 *</label>
        <select id="fDept">
          <option value="접수실">접수실</option>
          <option value="수술실">수술실</option>
          <option value="원무실">원무실</option>
        </select>
      </div>
      <div class="form-group">
        <label>약품명 *</label>
        <input type="text" id="fName" placeholder="예: 크라비트 안약 0.5%" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>종류 *</label>
          <select id="fType">
            <option value="안약">안약</option>
            <option value="1회용 안약">1회용 안약</option>
            <option value="안연고">안연고</option>
            <option value="내복약">내복약</option>
            <option value="주사제">주사제</option>
            <option value="소모품">소모품</option>
            <option value="박스">박스</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label>유효기간 *</label>
          <input type="date" id="fExp" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>현재 수량 *</label>
          <input type="number" id="fQty" min="0" placeholder="0" />
        </div>
        <div class="form-group">
          <label>초기(총) 수량 *</label>
          <input type="number" id="fInitQty" min="1" placeholder="100" />
        </div>
      </div>
      <div class="form-group">
        <label>담당자</label>
        <input type="text" id="fManager" />
      </div>
      <div class="form-group">
        <label>메모</label>
        <textarea id="fMemo" placeholder="특이사항, 보관조건 등"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbwTfp_Lty37JaSDYTIkqeP8CFgeA9t0ahlqbq3v4lxEAaucH1BaUs6tVO-tltfrihzi/exec';
let allData = [];
let currentDept = '전체';
let sortField = '약품명';
let sortAsc = true;
const DEPTS = ['전체', '접수실', '수술실', '원무실'];
const DEPT_COLORS = { '접수실': '#2563eb', '수술실': '#7c3aed', '원무실': '#0891b2' };
const DRUG_TYPES = ['안약', '1회용 안약', '안연고', '내복약', '주사제', '소모품', '박스', '기타'];

// ═══════════════════════════════════════
// Init
// ═══════════════════════════════════════
function init() {
  showApp();
}

function showApp() {
  document.getElementById('app').style.display = '';
  renderDeptTabs();
  loadData();
}

// ═══════════════════════════════════════
// API
// ═══════════════════════════════════════
async function apiCall(action, body = null) {
  try {
    // Google Apps Script는 POST→302 리다이렉트 시 body를 잃어버림
    // 모든 요청을 GET + URL 파라미터로 처리
    let url = `${API_URL}?action=${action}`;
    if (body) {
      url += '&data=' + encodeURIComponent(JSON.stringify(body));
    }
    const res = await fetch(url, { redirect: 'follow' });
    const text = await res.text();
    try {
      return JSON.parse(text);
    } catch (pe) {
      console.error('JSON parse error:', text.substring(0, 200));
      return { success: false, error: '응답 파싱 실패. Apps Script URL을 확인하세요.' };
    }
  } catch (e) {
    console.error('API error:', e);
    toast('서버 연결 실패. URL을 확인하세요.', 'error');
    return { success: false, error: e.message };
  }
}

async function loadData() {
  showLoading(true);
  const result = await apiCall('getAll');
  showLoading(false);
  if (result.success) {
    allData = result.data || [];
    updateTypeFilter();
    renderAll();
    toast('데이터 불러옴', 'success');
  } else {
    toast('데이터 로드 실패: ' + (result.error || ''), 'error');
  }
}

// ═══════════════════════════════════════
// Render
// ═══════════════════════════════════════
function renderDeptTabs() {
  const c = document.getElementById('deptTabs');
  c.innerHTML = DEPTS.map(d =>
    `<button class="dept-tab ${d === currentDept ? 'active' : ''}" onclick="switchDept('${d}')">${d}</button>`
  ).join('');

  // My dept badge
  const badge = document.getElementById('myDeptBadge');
  if (currentDept !== '전체') {
    badge.textContent = currentDept;
    badge.style.background = DEPT_COLORS[currentDept] || '#666';
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function switchDept(d) {
  currentDept = d;
  renderDeptTabs();
  renderAll();
}

function getFiltered() {
  let items = [...allData];

  // Dept filter
  if (currentDept !== '전체') {
    items = items.filter(i => i['부서'] === currentDept);
  }

  // Search
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) {
    items = items.filter(i => (i['약품명'] || '').toLowerCase().includes(q));
  }

  // Type filter
  const tf = document.getElementById('typeFilter').value;
  if (tf) {
    items = items.filter(i => i['종류'] === tf);
  }

  // Status filter
  const sf = document.getElementById('statusFilter').value;
  if (sf) {
    items = items.filter(i => {
      const s = getStatus(i);
      if (sf === 'normal') return s.level === 'ok';
      if (sf === 'expiring') return s.expiring;
      if (sf === 'low') return s.lowStock;
      if (sf === 'both') return s.expiring && s.lowStock;
      return true;
    });
  }

  // Sort
  items.sort((a, b) => {
    let va = a[sortField] ?? '';
    let vb = b[sortField] ?? '';
    if (sortField === '수량') { va = Number(va); vb = Number(vb); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  return items;
}

function getStatus(item) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const exp = new Date(item['유효기간']);
  const daysLeft = Math.ceil((exp - today) / 86400000);
  const expiring = daysLeft <= 30;
  const expired = daysLeft < 0;

  const qty = Number(item['수량']) || 0;
  const init = Number(item['초기수량']) || 1;
  const pct = (qty / init) * 100;
  const lowStock = pct <= 10;

  let level = 'ok';
  if (expired || (expiring && lowStock)) level = 'critical';
  else if (expiring || lowStock) level = 'warning';

  return { expiring, expired, lowStock, daysLeft, pct, level, qty, init };
}

function renderAll() {
  renderSummary();
  renderAlerts();
  renderTable();
}

function renderSummary() {
  const items = currentDept === '전체' ? allData : allData.filter(i => i['부서'] === currentDept);
  const total = items.length;
  let expCount = 0, lowCount = 0;
  items.forEach(i => {
    const s = getStatus(i);
    if (s.expiring || s.expired) expCount++;
    if (s.lowStock) lowCount++;
  });

  document.getElementById('summaryRow').innerHTML = `
    <div class="summary-card"><div class="label">총 약품 수</div><div class="value">${total}</div></div>
    <div class="summary-card ${expCount ? 'alert-card' : ''}"><div class="label">유효기간 임박/만료</div><div class="value">${expCount}</div></div>
    <div class="summary-card ${lowCount ? 'warn-card' : ''}"><div class="label">재고 부족 (≤10%)</div><div class="value">${lowCount}</div></div>
    <div class="summary-card"><div class="label">부서</div><div class="value" style="font-size:18px;">${currentDept === '전체' ? '3개 부서' : currentDept}</div></div>
  `;

  // Alert count in header
  const alertTotal = expCount + lowCount;
  document.getElementById('alertCountArea').innerHTML = alertTotal ?
    `<span class="badge" title="경고 항목">${alertTotal}</span>` : '';
}

function renderAlerts() {
  const items = currentDept === '전체' ? allData : allData.filter(i => i['부서'] === currentDept);
  const expItems = [];
  const lowItems = [];

  items.forEach(i => {
    const s = getStatus(i);
    if (s.expired) expItems.push({ name: i['약품명'], dept: i['부서'], msg: '만료됨' });
    else if (s.expiring) expItems.push({ name: i['약품명'], dept: i['부서'], msg: `${s.daysLeft}일 남음` });
    if (s.lowStock) lowItems.push({ name: i['약품명'], dept: i['부서'], msg: `${Math.round(s.pct)}% 잔여` });
  });

  let html = '';

  if (expItems.length) {
    html += `<div class="alert-banner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <div><strong>유효기간 경고 (${expItems.length}건)</strong>
        <div class="alert-items">${expItems.map(e => `<span class="alert-chip exp">${e.dept} · ${e.name} — ${e.msg}</span>`).join('')}</div>
      </div>
    </div>`;
  }

  if (lowItems.length) {
    html += `<div class="alert-banner warn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <div><strong>재고 부족 경고 (${lowItems.length}건)</strong>
        <div class="alert-items">${lowItems.map(e => `<span class="alert-chip low">${e.dept} · ${e.name} — ${e.msg}</span>`).join('')}</div>
      </div>
    </div>`;
  }

  document.getElementById('alertArea').innerHTML = html;
}

function renderTable() {
  const items = getFiltered();
  const tbody = document.getElementById('tableBody');

  if (!items.length) {
    tbody.innerHTML = '';
    document.getElementById('emptyArea').innerHTML = `
      <div class="empty-state"><div class="icon">📦</div><p>등록된 약품이 없습니다</p></div>`;
    return;
  }
  document.getElementById('emptyArea').innerHTML = '';

  tbody.innerHTML = items.map(item => {
    const s = getStatus(item);
    const deptColor = DEPT_COLORS[item['부서']] || '#888';

    // Stock bar color
    let barColor = '#10b981';
    if (s.pct <= 10) barColor = '#ef4444';
    else if (s.pct <= 30) barColor = '#f59e0b';

    // Exp display
    let expDisplay = item['유효기간'] || '-';
    let expClass = '';
    if (s.expired) { expDisplay += ' (만료)'; expClass = 'color:var(--danger);font-weight:700;'; }
    else if (s.expiring) { expDisplay += ` (${s.daysLeft}일)` ; expClass = 'color:var(--warning);font-weight:600;'; }

    // Status
    let statusHtml = '<span class="status-dot" style="background:#10b981;"></span>정상';
    if (s.level === 'critical') statusHtml = '<span class="status-dot" style="background:#ef4444;"></span>위험';
    else if (s.level === 'warning') statusHtml = '<span class="status-dot" style="background:#f59e0b;"></span>주의';

    return `<tr>
      <td><span class="dept-label" style="background:${deptColor}">${item['부서']}</span></td>
      <td style="font-weight:600;">${esc(item['약품명'])}</td>
      <td><span class="type-badge">${esc(item['종류'])}</span></td>
      <td>
        <div class="stock-bar"><div class="stock-bar-fill" style="width:${Math.min(s.pct,100)}%;background:${barColor}"></div></div>
        <span style="font-weight:600;">${s.qty}</span><span style="color:var(--text3);font-size:12px;">/${s.init}</span>
      </td>
      <td style="${expClass}">${expDisplay}</td>
      <td style="font-size:13px;">${statusHtml}</td>
      <td style="font-size:13px;color:var(--text2);">${esc(item['담당자'] || '')}</td>
      <td>
        <div class="actions-cell">
          <button class="btn-sm" onclick="openEditModal('${item.id}')">수정</button>
          <button class="btn-sm del" onclick="deleteItem('${item.id}','${esc(item['약품명'])}')">삭제</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function updateTypeFilter() {
  const types = [...new Set(allData.map(i => i['종류']).filter(Boolean))];
  const sel = document.getElementById('typeFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">전체 종류</option>' +
    types.map(t => `<option value="${t}" ${t === cur ? 'selected' : ''}>${t}</option>`).join('');
}

function sortBy(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  renderTable();
}

// ═══════════════════════════════════════
// Modal / CRUD
// ═══════════════════════════════════════
function openAddModal() {
  document.getElementById('modalTitle').textContent = '약품 등록';
  document.getElementById('editId').value = '';
  document.getElementById('fDept').value = currentDept !== '전체' ? currentDept : '접수실';
  document.getElementById('fName').value = '';
  document.getElementById('fType').value = '안약';
  document.getElementById('fExp').value = '';
  document.getElementById('fQty').value = '';
  document.getElementById('fInitQty').value = '';
  document.getElementById('fManager').value = '';
  document.getElementById('fMemo').value = '';
  document.getElementById('modalOverlay').style.display = '';
}

function openEditModal(id) {
  const item = allData.find(i => i.id === id);
  if (!item) return;
  document.getElementById('modalTitle').textContent = '약품 수정';
  document.getElementById('editId').value = id;
  document.getElementById('fDept').value = item['부서'];
  document.getElementById('fName').value = item['약품명'];
  document.getElementById('fType').value = item['종류'];
  document.getElementById('fExp').value = item['유효기간'];
  document.getElementById('fQty').value = item['수량'];
  document.getElementById('fInitQty').value = item['초기수량'];
  document.getElementById('fManager').value = item['담당자'];
  document.getElementById('fMemo').value = item['메모'] || '';
  document.getElementById('modalOverlay').style.display = '';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

async function saveItem() {
  const id = document.getElementById('editId').value;
  const data = {
    '부서': document.getElementById('fDept').value,
    '약품명': document.getElementById('fName').value.trim(),
    '종류': document.getElementById('fType').value,
    '유효기간': document.getElementById('fExp').value,
    '수량': document.getElementById('fQty').value,
    '초기수량': document.getElementById('fInitQty').value,
    '담당자': document.getElementById('fManager').value.trim(),
    '메모': document.getElementById('fMemo').value.trim(),
  };

  if (!data['약품명'] || !data['유효기간'] || !data['수량'] || !data['초기수량']) {
    toast('필수 항목을 모두 입력하세요', 'error');
    return;
  }

  let result;
  if (id) {
    data.id = id;
    result = await apiCall('update', data);
  } else {
    result = await apiCall('add', data);
  }

  if (result.success) {
    toast(id ? '수정 완료' : '등록 완료', 'success');
    closeModal();
    loadData();
  } else {
    toast('저장 실패: ' + (result.error || ''), 'error');
  }
}

async function deleteItem(id, name) {
  if (!confirm(`"${name}" 을(를) 삭제하시겠습니까?`)) return;
  const result = await apiCall('delete&id=' + encodeURIComponent(id), null);
  if (result.success) {
    toast('삭제 완료', 'success');
    loadData();
  } else {
    toast('삭제 실패', 'error');
  }
}

// ═══════════════════════════════════════
// Utilities
// ═══════════════════════════════════════
function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function showLoading(show) {
  document.getElementById('loadingArea').innerHTML = show ?
    '<div class="loading"><div class="spinner"></div>데이터 불러오는 중...</div>' : '';
}

function toast(msg, type = '') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ═══════════════════════════════════════
// Boot
// ═══════════════════════════════════════
init();
</script>
